<!DOCTYPE html>
<html>
<head>
  <title>Sliding Puzzle Game</title>
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; }
    #puzzle { display: grid; grid-template-columns: repeat(4, 100px); grid-template-rows: repeat(4, 100px); gap: 2px; }
    .tile {
      background: #3498db;
      color: white;
      font-size: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }
    .empty { background: #222; }
  </style>
</head>
<body>
<div id="puzzle"></div>
<script>
const puzzle = document.getElementById("puzzle");
let tiles = [...Array(15).keys()].map(n => n+1);
tiles.push(null); // empty space

function drawPuzzle() {
  puzzle.innerHTML = "";
  tiles.forEach((tile, i) => {
    const div = document.createElement("div");
    div.className = tile ? "tile" : "tile empty";
    if(tile) div.textContent = tile;
    div.addEventListener("click", () => moveTile(i));
    puzzle.appendChild(div);
  });
}

function moveTile(i) {
  const emptyIndex = tiles.indexOf(null);
  const validMoves = [emptyIndex-1, emptyIndex+1, emptyIndex-4, emptyIndex+4];
  if(validMoves.includes(i)) {
    [tiles[i], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[i]];
    drawPuzzle();
    checkWin();
  }
}

function shuffle() {
  for(let i=0; i<1000; i++) {
    moveTile(Math.floor(Math.random()*16));
  }
}

function checkWin() {
  const win = [...Array(15).keys()].map(n => n+1).concat(null);
  if(JSON.stringify(tiles) === JSON.stringify(win)) {
    setTimeout(()=>alert("You solved the puzzle!"), 200);
  }
}

shuffle();
drawPuzzle();
</script>
</body>
</html>
