<!DOCTYPE html>
<html>
<head>
  <title>Shadow Fight Clone</title>
  <style>
    body { margin: 0; background: #111; }
    canvas { display: block; margin: auto; background: linear-gradient(#222, #000); }
  </style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="400"></canvas>
<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

class Fighter {
  constructor(x, color, controls) {
    this.x = x; this.y = 300;
    this.width = 40; this.height = 80;
    this.color = color;
    this.controls = controls;
    this.isAttacking = false;
    this.health = 100;
  }
  draw() {
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x, this.y, this.width, this.height);
    if(this.isAttacking) {
      ctx.fillStyle = "red";
      ctx.fillRect(this.x + this.width, this.y+20, 20, 20);
    }
  }
  attack(opponent) {
    this.isAttacking = true;
    if(this.x+this.width+20 > opponent.x && this.x < opponent.x+opponent.width) {
      opponent.health -= 5;
    }
    setTimeout(()=>this.isAttacking=false,200);
  }
}

let player1 = new Fighter(100,"black",{left:"a",right:"d",attack:"w"});
let player2 = new Fighter(600,"black",{left:"ArrowLeft",right:"ArrowRight",attack:"ArrowUp"});

let keys = {};
document.addEventListener("keydown", e => keys[e.key]=true);
document.addEventListener("keyup", e => keys[e.key]=false);

function update() {
  if(keys[player1.controls.left]) player1.x -= 3;
  if(keys[player1.controls.right]) player1.x += 3;
  if(keys[player1.controls.attack]) player1.attack(player2);

  if(keys[player2.controls.left]) player2.x -= 3;
  if(keys[player2.controls.right]) player2.x += 3;
  if(keys[player2.controls.attack]) player2.attack(player1);
}

function drawHealth() {
  ctx.fillStyle="white";
  ctx.fillText("P1 Health: "+player1.health,20,20);
  ctx.fillText("P2 Health: "+player2.health,650,20);
}

function gameLoop() {
  ctx.clearRect(0,0,800,400);
  update();
  player1.draw();
  player2.draw();
  drawHealth();
  requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
